<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>思维数学乐园 - 小学1~6年级</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.container {
  background: #fff;
  border-radius: 24px;
  padding: 40px;
  max-width: 700px;
  width: 100%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  position: relative;
  overflow: hidden;
}
.container::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 6px;
  background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3, #54a0ff);
}
h1 {
  text-align: center;
  font-size: 2em;
  color: #2d3436;
  margin-bottom: 8px;
}
.subtitle {
  text-align: center;
  color: #636e72;
  margin-bottom: 30px;
  font-size: 1.05em;
}
.grade-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  margin-bottom: 20px;
}
.grade-btn {
  padding: 18px 10px;
  border: 3px solid #dfe6e9;
  border-radius: 16px;
  background: #fff;
  font-size: 1.1em;
  font-weight: bold;
  color: #2d3436;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}
.grade-btn:hover { border-color: #6c5ce7; background: #f8f7ff; transform: translateY(-2px); }
.grade-btn.selected { border-color: #6c5ce7; background: #6c5ce7; color: #fff; }
.section-title {
  font-size: 1.15em;
  font-weight: bold;
  color: #2d3436;
  margin: 20px 0 12px;
}
.category-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 24px;
}
.cat-btn {
  padding: 10px 18px;
  border: 2px solid #dfe6e9;
  border-radius: 20px;
  background: #fff;
  font-size: 0.95em;
  color: #2d3436;
  cursor: pointer;
  transition: all 0.2s;
}
.cat-btn:hover { border-color: #00b894; background: #f0fff9; }
.cat-btn.selected { border-color: #00b894; background: #00b894; color: #fff; }
.start-btn {
  display: block;
  width: 100%;
  padding: 16px;
  border: none;
  border-radius: 14px;
  background: linear-gradient(135deg, #6c5ce7, #a29bfe);
  color: #fff;
  font-size: 1.2em;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.2s;
}
.start-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(108,92,231,0.4); }
.start-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
.quiz-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}
.quiz-info { font-size: 0.9em; color: #636e72; }
.quiz-category {
  display: inline-block;
  padding: 4px 14px;
  background: #dfe6e9;
  border-radius: 12px;
  font-size: 0.85em;
  color: #2d3436;
}
.progress-bar {
  width: 100%;
  height: 8px;
  background: #ecf0f1;
  border-radius: 4px;
  margin-bottom: 24px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #6c5ce7, #a29bfe);
  border-radius: 4px;
  transition: width 0.4s;
}
.question-text {
  font-size: 1.25em;
  color: #2d3436;
  line-height: 1.7;
  margin-bottom: 24px;
  padding: 20px;
  background: #f8f9fa;
  border-radius: 14px;
  border-left: 5px solid #6c5ce7;
}
.options-list { list-style: none; margin-bottom: 20px; }
.option-item {
  padding: 14px 20px;
  margin-bottom: 10px;
  border: 2px solid #dfe6e9;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.2s;
  font-size: 1.05em;
}
.option-item:hover { border-color: #6c5ce7; background: #f8f7ff; }
.option-item.correct { border-color: #00b894; background: #e6fff7; }
.option-item.wrong { border-color: #d63031; background: #ffe6e6; }
.option-item.disabled { pointer-events: none; opacity: 0.7; }
.option-item.show-correct { border-color: #00b894; background: #e6fff7; }
.fill-input {
  width: 200px;
  padding: 12px 16px;
  border: 2px solid #dfe6e9;
  border-radius: 10px;
  font-size: 1.1em;
  text-align: center;
  outline: none;
  transition: border-color 0.2s;
}
.fill-input:focus { border-color: #6c5ce7; }
.fill-input.correct { border-color: #00b894; background: #e6fff7; }
.fill-input.wrong { border-color: #d63031; background: #ffe6e6; }
.submit-btn {
  display: inline-block;
  padding: 12px 30px;
  border: none;
  border-radius: 10px;
  background: #6c5ce7;
  color: #fff;
  font-size: 1em;
  font-weight: bold;
  cursor: pointer;
  margin-top: 12px;
  transition: all 0.2s;
}
.submit-btn:hover { background: #5a4bd1; }
.feedback {
  margin-top: 20px;
  padding: 18px;
  border-radius: 14px;
  display: none;
}
.feedback.show { display: block; }
.feedback.correct-fb { background: #e6fff7; border: 2px solid #00b894; }
.feedback.wrong-fb { background: #ffe6e6; border: 2px solid #d63031; }
.feedback-title { font-size: 1.1em; font-weight: bold; margin-bottom: 8px; }
.feedback.correct-fb .feedback-title { color: #00b894; }
.feedback.wrong-fb .feedback-title { color: #d63031; }
.explanation { color: #2d3436; line-height: 1.7; font-size: 0.98em; }
.next-btn {
  display: inline-block;
  padding: 12px 30px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(135deg, #00b894, #55efc4);
  color: #fff;
  font-size: 1em;
  font-weight: bold;
  cursor: pointer;
  margin-top: 16px;
  transition: all 0.2s;
}
.next-btn:hover { transform: translateY(-2px); }
.score-board { text-align: center; padding: 30px 0; }
.score-number { font-size: 3.5em; font-weight: bold; color: #6c5ce7; }
.score-label { color: #636e72; margin-top: 8px; font-size: 1.1em; }
.score-stars { font-size: 2em; margin: 16px 0; }
.retry-btn {
  display: inline-block;
  padding: 14px 36px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, #6c5ce7, #a29bfe);
  color: #fff;
  font-size: 1.1em;
  font-weight: bold;
  cursor: pointer;
  margin-top: 20px;
  transition: all 0.2s;
}
.retry-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(108,92,231,0.4); }
.hidden { display: none; }
.back-btn {
  position: absolute;
  top: 20px;
  left: 20px;
  padding: 8px 16px;
  border: 2px solid #dfe6e9;
  border-radius: 8px;
  background: #fff;
  color: #636e72;
  cursor: pointer;
  font-size: 0.9em;
  transition: all 0.2s;
}
.back-btn:hover { border-color: #6c5ce7; color: #6c5ce7; }
@media (max-width: 500px) {
  .container { padding: 24px 18px; }
  .grade-grid { grid-template-columns: repeat(2, 1fr); }
  h1 { font-size: 1.5em; }
  .question-text { font-size: 1.1em; }
}
</style>
</head>
<body>
<div class="container">
  <div id="screen-home">
    <h1>🧠 思维数学乐园</h1>
    <p class="subtitle">选择你的年级和喜欢的题目类型吧！</p>
    <div class="section-title">📚 选择年级</div>
    <div class="grade-grid" id="gradeGrid"></div>
    <div class="section-title">🎯 选择题目类别（可多选）</div>
    <div class="category-grid" id="categoryGrid"></div>
    <button class="start-btn" id="startBtn" disabled onclick="startQuiz()">开始答题</button>
  </div>

  <div id="screen-quiz" class="hidden">
    <button class="back-btn" onclick="goHome()">← 返回</button>
    <div class="quiz-header">
      <span class="quiz-info" id="quizProgress">第 1/10 题</span>
      <span class="quiz-category" id="quizCategory">找规律</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="question-text" id="questionText"></div>
    <div id="answerArea"></div>
    <div class="feedback" id="feedback">
      <div class="feedback-title" id="feedbackTitle"></div>
      <div class="explanation" id="explanation"></div>
      <button class="next-btn" id="nextBtn" onclick="nextQuestion()">下一题 →</button>
    </div>
  </div>

  <div id="screen-score" class="hidden">
    <div class="score-board">
      <h1>🎉 答题完成！</h1>
      <div class="score-number" id="scoreNumber">0/10</div>
      <div class="score-label" id="scoreLabel"></div>
      <div class="score-stars" id="scoreStars"></div>
      <button class="retry-btn" onclick="goHome()">再来一轮</button>
    </div>
  </div>
</div>

<script>
// ========== 题库 ==========
const QUESTION_BANK = {

      {q: "按规律填数：2, 6, 10, 14, __", type: "fill", answer: "18", explain: "每次加4，14+4=18。"},

      {q: "按规律填数：100, 81, 64, __, 36", type: "fill", answer: "49", explain: "这是平方数倒序：10²、9²、8²、7²、6²，所以填7²=49。"},

    "几何图形": [

      {q: "有40%的盐水50克，要稀释成10%，需加水多少克？", type: "fill", answer: "150", explain: "盐=50×40%=20克，20÷10%=200克溶液，加水200-50=150克。"},
      {q: "有200克15%的糖水，再加50克糖，新糖水浓度是多少%？", type: "fill", answer: "32", explain: "原糖=200×15%=30克，加糖后糖=80克，溶液=250克，浓度=80÷250=32%。"},
      {q: "把30克盐溶解在120克水中，盐水浓度是多少%？", type: "fill", answer: "20", explain: "浓度=30÷(30+120)=20%。"}

// ========== 应用逻辑 ==========
let selectedGrade = null;
let selectedCategories = [];
let currentQuestions = [];
let currentIndex = 0;
let score = 0;
let answered = false;
const TOTAL_QUESTIONS = 10;

function initGrades() {
  const grid = document.getElementById('gradeGrid');
  const grades = ['一年级','二年级','三年级','四年级','五年级','六年级'];
  grades.forEach(g => {
    const btn = document.createElement('button');
    btn.className = 'grade-btn';
    btn.textContent = g;
    btn.onclick = () => selectGrade(g, btn);
    grid.appendChild(btn);
  });
}

function selectGrade(grade, btn) {
  selectedGrade = grade;
  document.querySelectorAll('.grade-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  updateCategories();
  checkReady();
}

function updateCategories() {
  const grid = document.getElementById('categoryGrid');
  grid.innerHTML = '';
  selectedCategories = [];
  if (!selectedGrade) return;
  const cats = Object.keys(QUESTION_BANK[selectedGrade]);
  const allBtn = document.createElement('button');
  allBtn.className = 'cat-btn';
  allBtn.textContent = '🎲 综合（全部类别）';
  allBtn.onclick = () => {
    selectedCategories = [...cats];
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('selected'));
    allBtn.classList.add('selected');
    checkReady();
  };
  grid.appendChild(allBtn);
  cats.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn';
    btn.textContent = c;
    btn.onclick = () => {
      allBtn.classList.remove('selected');
      btn.classList.toggle('selected');
      if (selectedCategories.includes(c)) {
        selectedCategories = selectedCategories.filter(x => x !== c);
      } else {
        selectedCategories.push(c);
      }
      checkReady();
    };
    grid.appendChild(btn);
  });
}

function checkReady() {
  document.getElementById('startBtn').disabled = !(selectedGrade && selectedCategories.length > 0);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz() {
  let pool = [];
  selectedCategories.forEach(cat => {
    const qs = QUESTION_BANK[selectedGrade][cat] || [];
    qs.forEach(q => pool.push({...q, category: cat}));
  });
  pool = shuffle(pool);
  currentQuestions = pool.slice(0, Math.min(TOTAL_QUESTIONS, pool.length));
  currentIndex = 0;
  score = 0;
  answered = false;
  document.getElementById('screen-home').classList.add('hidden');
  document.getElementById('screen-score').classList.add('hidden');
  document.getElementById('screen-quiz').classList.remove('hidden');
  showQuestion();
}

function showQuestion() {
  answered = false;
  const q = currentQuestions[currentIndex];
  document.getElementById('quizProgress').textContent = `第 ${currentIndex+1}/${currentQuestions.length} 题`;
  document.getElementById('quizCategory').textContent = q.category;
  document.getElementById('progressFill').style.width = ((currentIndex) / currentQuestions.length * 100) + '%';
  document.getElementById('questionText').textContent = q.q;
  document.getElementById('feedback').className = 'feedback';
  const area = document.getElementById('answerArea');
  area.innerHTML = '';

  if (q.type === 'choice') {
    const ul = document.createElement('ul');
    ul.className = 'options-list';
    q.options.forEach((opt, i) => {
      const li = document.createElement('li');
      li.className = 'option-item';
      li.textContent = String.fromCharCode(65 + i) + '. ' + opt;
      li.onclick = () => selectOption(i, li);
      ul.appendChild(li);
    });
    area.appendChild(ul);
  } else {
    const div = document.createElement('div');
    div.style.textAlign = 'center';
    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'fill-input';
    input.placeholder = '输入答案';
    input.id = 'fillAnswer';
    input.onkeydown = (e) => { if (e.key === 'Enter') submitFill(); };
    const btn = document.createElement('button');
    btn.className = 'submit-btn';
    btn.textContent = '确认答案';
    btn.onclick = submitFill;
    div.appendChild(input);
    div.appendChild(document.createElement('br'));
    div.appendChild(btn);
    area.appendChild(div);
    setTimeout(() => input.focus(), 100);
  }
}

function selectOption(idx, li) {
  if (answered) return;
  answered = true;
  const q = currentQuestions[currentIndex];
  const items = document.querySelectorAll('.option-item');
  items.forEach(item => item.classList.add('disabled'));
  if (idx === q.answer) {
    li.classList.add('correct');
    showFeedback(true, q.explain);
    score++;
  } else {
    li.classList.add('wrong');
    items[q.answer].classList.add('show-correct');
    showFeedback(false, q.explain);
  }
}

function submitFill() {
  if (answered) return;
  const input = document.getElementById('fillAnswer');
  const val = input.value.trim();
  if (!val) return;
  answered = true;
  const q = currentQuestions[currentIndex];
  input.disabled = true;
  if (val === q.answer || val === q.answer.toString()) {
    input.classList.add('correct');
    showFeedback(true, q.explain);
    score++;
  } else {
    input.classList.add('wrong');
    showFeedback(false, q.explain + '（正确答案：' + q.answer + '）');
  }
}

function showFeedback(correct, explain) {
  const fb = document.getElementById('feedback');
  fb.className = 'feedback show ' + (correct ? 'correct-fb' : 'wrong-fb');
  document.getElementById('feedbackTitle').textContent = correct ? '✅ 回答正确！太棒了！' : '❌ 回答错误，没关系，看看讲解吧！';
  document.getElementById('explanation').textContent = '💡 ' + explain;
  const nextBtn = document.getElementById('nextBtn');
  nextBtn.textContent = currentIndex < currentQuestions.length - 1 ? '下一题 →' : '查看成绩 🎉';
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex >= currentQuestions.length) {
    showScore();
  } else {
    showQuestion();
  }
}

function showScore() {
  document.getElementById('screen-quiz').classList.add('hidden');
  document.getElementById('screen-score').classList.remove('hidden');
  const total = currentQuestions.length;
  document.getElementById('scoreNumber').textContent = `${score}/${total}`;
  const pct = score / total;
  let label = '', stars = '';
  if (pct === 1) { label = '满分！你是数学小天才！'; stars = '⭐⭐⭐⭐⭐'; }
  else if (pct >= 0.8) { label = '非常棒！继续加油！'; stars = '⭐⭐⭐⭐'; }
  else if (pct >= 0.6) { label = '不错哦，再练练会更好！'; stars = '⭐⭐⭐'; }
  else if (pct >= 0.4) { label = '加油！多看看讲解就能进步！'; stars = '⭐⭐'; }
  else { label = '别灰心，多练习就会变强！'; stars = '⭐'; }
  document.getElementById('scoreLabel').textContent = label;
  document.getElementById('scoreStars').textContent = stars;
}

function goHome() {
  document.getElementById('screen-quiz').classList.add('hidden');
  document.getElementById('screen-score').classList.add('hidden');
  document.getElementById('screen-home').classList.remove('hidden');
}

initGrades();
</script>
